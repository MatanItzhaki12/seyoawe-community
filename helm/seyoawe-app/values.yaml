nameOverride: ""
fullnameOverride: ""

engine:
  replicaCount: 1
  image:
    # Override via --set or Ansible: e.g. "<dockerhub-user>/seyoawe-engine".
    repository: seyoawe-engine
    tag: latest
    # "Always" is appropriate while tag is a mutable label like "latest".
    # Switch to "IfNotPresent" once tags are immutable (commit SHA or semver).
    pullPolicy: Always
  service:
    port: 8080
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  persistence:
    size: 10Gi
    storageClassName: gp3
    accessModes:
      - ReadWriteOnce
  probes:
    readiness:
      tcpSocket:
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 6
    liveness:
      tcpSocket:
        port: http
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3

cli:
  replicaCount: 1
  image:
    # Override via --set or Ansible: e.g. "<dockerhub-user>/seyoawe-cli".
    repository: seyoawe-cli
    tag: latest
    pullPolicy: Always
  # The pod runs `sleep infinity`, so it only needs enough headroom for a
  # transient `sawectl` invocation when a user kubectl-execs into it.
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "128Mi"
      cpu: "200m"

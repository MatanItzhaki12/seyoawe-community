apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "seyoawe-app.fullname" . }}-engine
  labels:
    app.kubernetes.io/name: {{ include "seyoawe-app.name" . }}
    app.kubernetes.io/component: engine
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ include "seyoawe-app.fullname" . }}-engine
  replicas: {{ .Values.engine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "seyoawe-app.name" . }}
      app.kubernetes.io/component: engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "seyoawe-app.name" . }}
        app.kubernetes.io/component: engine
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: engine
          image: "{{ .Values.engine.image.repository }}:{{ .Values.engine.image.tag }}"
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - name: http
              containerPort: {{ .Values.engine.service.port }}
          volumeMounts:
            - name: engine-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: engine-data
      spec:
        accessModes:
{{- range .Values.engine.persistence.accessModes }}
          - {{ . }}
{{- end }}
        storageClassName: {{ .Values.engine.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.engine.persistence.size }}

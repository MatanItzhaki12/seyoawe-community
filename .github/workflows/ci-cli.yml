name: ci-cli

on:
  pull_request:
    paths:
      - "CLI/sawectl/**"
      - "docker/dockerfile.cli"
      - "tests/**"
      - ".github/workflows/ci-cli.yml"
  push:
    branches: ["main"]
    paths:
      - "CLI/sawectl/**"
      - "docker/dockerfile.cli"
      - "tests/**"
      - ".github/workflows/ci-cli.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r CLI/sawectl/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q tests

      - name: Build cli Docker image
        run: |
          docker build -f docker/dockerfile.cli -t seyoawe-cli:ci .

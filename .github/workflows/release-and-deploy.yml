name: release-and-deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docker/**"
      - "Engine/modules/**"
      - "CLI/sawectl/**"
      - "Engine/configuration/**"
      - "Engine/workflows/**"
      - "infra/terraform/**"
      - "infra/ansible/**"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: docker.io
  ENGINE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/seyoawe-engine
  CLI_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/seyoawe-cli

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      engine_changed: ${{ steps.changes.outputs.engine }}
      cli_changed: ${{ steps.changes.outputs.cli }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            engine:
              - "docker/dockerfile.engine"
              - "Engine/modules/**"
              - "Engine/configuration/**"
              - "Engine/workflows/**"
            cli:
              - "docker/dockerfile.cli"
              - "CLI/sawectl/**"

      - name: Calculate shared semantic version
        id: version
        run: |
          git fetch --tags --force
          LAST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "$LAST_TAG" ]; then
            echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<EOF
$BASE
EOF
          if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ -z "$PATCH" ]; then
            echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NEXT_PATCH="$((PATCH + 1))"
          echo "version=v${MAJOR}.${MINOR}.${NEXT_PATCH}" >> "$GITHUB_OUTPUT"

  publish-images:
    runs-on: ubuntu-latest
    needs: [compute-version]
    if: needs.compute-version.outputs.engine_changed == 'true' || needs.compute-version.outputs.cli_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push engine image
        if: needs.compute-version.outputs.engine_changed == 'true'
        run: |
          docker build -f docker/dockerfile.engine -t "${ENGINE_IMAGE}:${{ needs.compute-version.outputs.version }}" .
          docker tag "${ENGINE_IMAGE}:${{ needs.compute-version.outputs.version }}" "${ENGINE_IMAGE}:latest"
          docker push "${ENGINE_IMAGE}:${{ needs.compute-version.outputs.version }}"
          docker push "${ENGINE_IMAGE}:latest"

      - name: Build and push cli image
        if: needs.compute-version.outputs.cli_changed == 'true'
        run: |
          docker build -f docker/dockerfile.cli -t "${CLI_IMAGE}:${{ needs.compute-version.outputs.version }}" .
          docker tag "${CLI_IMAGE}:${{ needs.compute-version.outputs.version }}" "${CLI_IMAGE}:latest"
          docker push "${CLI_IMAGE}:${{ needs.compute-version.outputs.version }}"
          docker push "${CLI_IMAGE}:latest"

      - name: Create Git tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ needs.compute-version.outputs.version }}";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha
              });
            } catch (error) {
              if (error.status === 422) {
                core.info(`Tag ${tag} already exists, skipping.`);
              } else {
                throw error;
              }
            }

  deploy:
    runs-on: ubuntu-latest
    needs: [compute-version, publish-images]
    if: needs.publish-images.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Placeholder deploy stage
        run: |
          echo "Wire Terraform, Ansible, and Kubernetes deployment here."
          echo "Version: ${{ needs.compute-version.outputs.version }}"

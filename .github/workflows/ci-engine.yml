name: ci-engine

on:
  pull_request:
    paths:
      - "docker/dockerfile.engine"
      - "Engine/modules/**"
      - "Engine/configuration/**"
      - "Engine/workflows/**"
      - "tests/**"
      - ".github/workflows/ci-engine.yml"
  push:
    branches: ["main"]
    paths:
      - "docker/dockerfile.engine"
      - "Engine/modules/**"
      - "Engine/configuration/**"
      - "Engine/workflows/**"
      - "tests/**"
      - ".github/workflows/ci-engine.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml jsonschema requests

      - name: Run unit and integration tests
        run: pytest -q tests

      - name: Verify engine binary exists
        run: |
          test -f Engine/seyoawe.linux

      - name: Build engine Docker image
        run: |
          docker build -f docker/dockerfile.engine -t seyoawe-engine:ci .

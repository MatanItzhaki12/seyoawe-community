name: CD - Deploy AWS

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-aws:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == github.event.repository.default_branch
      )
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.2"

      - name: Install Ansible and Kubernetes collection
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9,<11" kubernetes
          ansible-galaxy collection install kubernetes.core

      - name: Select app image version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "APP_VERSION=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=latest" >> "$GITHUB_ENV"
          fi

      - name: Terraform init
        working-directory: infrastructure/terraform
        run: terraform init -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve -lock=false

      - name: Configure kubeconfig from Terraform output
        shell: bash
        working-directory: infrastructure/terraform
        run: |
          KUBECONFIG_CMD="$(terraform output -raw kubeconfig_update_command)"
          echo "Running: ${KUBECONFIG_CMD}"
          eval "${KUBECONFIG_CMD}"

      - name: Deploy monitoring and app via Ansible
        run: ansible-playbook infrastructure/ansible/deploy.yml -e "app_version=${APP_VERSION}"

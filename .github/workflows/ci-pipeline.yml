name: CI Pipeline

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r CLI/sawectl/requirements.txt

      - name: Start Engine and CLI (Docker Compose)
        run: docker compose -f docker-compose.test.yml up -d --build --wait

      - name: Run pytest (unit, integration, e2e)
        env:
          SEYOAWE_ENGINE: 127.0.0.1:8080
        run: pytest -v tests

      - name: Tear down Docker Compose
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  on-failure:
    name: Handle Failure
    needs: run-tests
    runs-on: ubuntu-latest
    if: ${{ always() && needs.run-tests.result == 'failure' }}
    permissions:
      contents: read
    steps:
      - name: Create Jira issue
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          BASE="${JIRA_BASE_URL%/}"
          DESC=$(
            printf '%s\n\n%s\n%s\n%s\n%s\n%s' \
              "CI Pipeline failure — inspect the GitHub Actions run for logs." \
              "Failed run (link):" \
              "${RUN_URL}" \
              "Workflow: ${GITHUB_WORKFLOW}" \
              "Branch: ${GITHUB_REF_NAME}" \
              "Commit: ${GITHUB_SHA}"
          )
          BODY=$(jq -n \
            --arg summary "CI Pipeline Failed: ${GITHUB_REPOSITORY}" \
            --arg proj "${JIRA_PROJECT_KEY}" \
            --arg text "${DESC}" \
            '{
              fields: {
                project: { key: $proj },
                summary: $summary,
                description: {
                  type: "doc",
                  version: 1,
                  content: [
                    {
                      type: "paragraph",
                      content: [ { type: "text", text: $text } ]
                    }
                  ]
                },
                issuetype: { name: "Task" }
              }
            }')
          HTTP_CODE=$(curl -sS -o /tmp/jira_create_response.json -w "%{http_code}" \
            -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -X POST \
            "${BASE}/rest/api/3/issue" \
            -d "${BODY}")
          if [[ "${HTTP_CODE}" -lt 200 || "${HTTP_CODE}" -ge 300 ]]; then
            echo "Jira REST API returned HTTP ${HTTP_CODE}"
            cat /tmp/jira_create_response.json
            exit 1
          fi
          echo "Jira issue created:"
          cat /tmp/jira_create_response.json

      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.EMAIL_USERNAME }}
          subject: "GitHub Actions Failure: ${{ github.repository }}"
          body: |
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}

            Failed run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-and-push:
    name: Build and Publish to Docker Hub
    needs: run-tests
    runs-on: ubuntu-latest
    if: >-
      ${{
        always()
        && needs.run-tests.result == 'success'
        && github.ref_name == github.event.repository.default_branch
      }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git author for tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next patch version
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --force
          set +o pipefail
          LAST="$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)"
          set -o pipefail
          if [ -z "${LAST}" ]; then
            NEW_VERSION="0.0.1"
          else
            BASE="${LAST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE}"
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Computed release version: v${NEW_VERSION} (previous tag: ${LAST:-none})"

      - name: Create and push Git tag
        run: |
          set -euo pipefail
          TAG="v${{ steps.ver.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Local tag ${TAG} already exists; skipping create."
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
          fi
          git push origin "refs/tags/${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Engine and CLI images
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail
          ENGINE_IMAGE="${DOCKERHUB_NAMESPACE}/seyoawe-engine"
          CLI_IMAGE="${DOCKERHUB_NAMESPACE}/seyoawe-cli"
          docker build -f docker/dockerfile.engine \
            -t "${ENGINE_IMAGE}:${VERSION}" \
            -t "${ENGINE_IMAGE}:latest" .
          docker build -f docker/dockerfile.cli \
            -t "${CLI_IMAGE}:${VERSION}" \
            -t "${CLI_IMAGE}:latest" .
          docker push "${ENGINE_IMAGE}:${VERSION}"
          docker push "${ENGINE_IMAGE}:latest"
          docker push "${CLI_IMAGE}:${VERSION}"
          docker push "${CLI_IMAGE}:latest"
